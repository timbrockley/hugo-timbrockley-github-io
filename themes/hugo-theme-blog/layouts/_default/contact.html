{{- define "header" -}}
{{- end -}}
{{ define "main" }}

    <div id="main" data-nosnippet>


		<script src="/js/blog.js"></script>
		<script src="/js/contact-cloudflare.js"></script>

		<h2>Contact Us</h2>

		<form name="contact" id="contact" method="POST" class="hidden">
		<div class="hidden"><label>Don't fill this field out if you're human: <input name="bot-field" /></label></div>
		<input type="hidden" name="form-name" value="contact">
		<table class="noborder">
		<tr>
		<td>Name</td>
		<td><input name="name" id="name" type="text" size="40"></td>
		</tr>
		<tr>
		<td>Email</td>
		<td><input name="email" id="email" type="text" size="40"></td>
		</tr>
		<tr>
		<td>Message</td>
		<td><textarea name="message" id="message" cols="100" rows="10"></textarea></td>
		</tr>
		<tr id="human_test_tr" class="hidden">
		<td></td>
		<td>
		<input name="human_test" id="human_test" type="text" size="10">
		&nbsp;&nbsp;&nbsp;&nbsp;
		<span id="human_test_text"></span>
		<input type="hidden" id="check_value" name="check_value" value="">
		</td>
		</tr>
		<tr>
		<td></td>
		<td><button type="submit" onclick="handleSubmit();return false;" id="submit">Submit</button></td>
		</tr>
		</table>
		</form>

		<div id="form_status"></div>

    </div>

{{- end -}}
{{- define "sidebar" -}}
{{- end -}}
{{- define "footer" -}}
{{- end -}}
